name: Daily Automation

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install pandas openpyxl

      - name: Run script
        run: python agent.py
        env:
          EMAIL_ACCOUNTS: ${{ secrets.EMAIL_ACCOUNTS }}
