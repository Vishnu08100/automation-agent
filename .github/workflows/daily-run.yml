name: Daily Automation

on:
  schedule:
    - cron: '0 4 * * *'    # Runs at 9:30 AM IST (4:00 AM UTC)
  workflow_dispatch:       # Allows you to click "Run workflow" manually

# CRITICAL: This allows the action to push the sent logs back to your repository
permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas openpyxl

      - name: Run script
        env:
          EMAIL_ACCOUNTS: ${{ secrets.EMAIL_ACCOUNTS }}
        run: python agent.py

      - name: Save logs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/ || true
          git diff --staged --quiet || git commit -m "Logs $(date +%Y-%m-%d)"
          git push
